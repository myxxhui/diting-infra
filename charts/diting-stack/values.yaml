# Diting Stack - 仅包含静态存储（PV/PVC）、初始化 Job、采集 Job（云原生）
# 通过 diting-prod.yaml 中的 stack.storage / stack.ingest 覆盖

# 采集模块（Job）：集群内运行 diting-ingest 镜像，连接信息由 Secret 注入
# 指定标的 vs 全量：由 chart config/diting_symbols.txt（ConfigMap diting-ingest-symbols）挂载到 /config，Pod 内 DITING_SYMBOLS=/config/diting_symbols.txt；
# 当该文件含有效标的时 run_ingest_deploy 按「指定标的」跑（全量/增量均为该列表）；文件为空或仅注释时按「全量」跑（全 A 股或测试集增量）。
ingest:
  enabled: false
  # 生产环境（config/diting-prod.yaml）覆盖为项目 ACR + tag latest；diting-core 执行 make build-images 构建，make push-images 推送（需 DITING_ACR_PASSWORD）
  image:
    repository: diting-ingest
    tag: test
    pullPolicy: IfNotPresent
  # 私有 ACR 拉取凭证（如阿里云个人版）；创建：kubectl create secret docker-registry acr-titan --docker-server=crpi-7vifw4ok9jkcxr60.cn-hongkong.personal.cr.aliyuncs.com --docker-username=sean_hui --docker-password=<密码>
  imagePullSecrets: []
  # 集群内 Service DNS（与 Bitnami postgresql/redis Chart 实际创建的服务名一致，用于 init 容器 nc 检查与 Secret DSN）
  timescaleHost: "timescaledb-postgresql.default.svc.cluster.local"
  timescalePort: "5432"
  postgresL2Host: "postgresql-l2.default.svc.cluster.local"
  postgresL2Port: "5432"
  redisHost: "redis-master.default.svc.cluster.local"
  redisPort: "6379"
  # 与 stack.databases 中 auth 一致
  timescaleUser: "postgres"
  timescalePassword: "postgres"
  timescaleDatabase: "postgres"
  postgresL2User: "postgres"
  postgresL2Password: "postgres"
  postgresL2Database: "diting_l2"
  # 部署时检查：超过此天数未更新则全量，否则增量；见 run_ingest_deploy.py
  fullDaysThreshold: 7
  # 全量采集时各 Step 开关（Pod 内无 .env，必须由此或 Secret 注入；未设则 run_ingest_production 会跳过所有步骤）
  productionUniverse: true
  productionOhlcv: true
  productionIndustryRevenue: true
  productionNews: true
  # 数据源与时间范围（与 .env 中本地采集用变量一致；Pod 内无 .env，需由此或 Secret 注入才能正常拉数）
  # ingestSource: akshare | jqdata，空则默认 akshare；用 jqdata 时须同时配置 jqdataUser、jqdataPassword（或写入 Secret）
  ingestSource: ""
  jqdataDateStart: ""   # 可选，统一拉取区间起点，如 2025-01-01
  jqdataDateEnd: ""    # 可选，统一拉取区间终点，如 2025-08-01
  jqdataUser: ""       # 可选；敏感信息也可通过 kubectl 对 diting-ingest-conn 追加
  jqdataPassword: ""   # 可选；敏感信息建议通过 Secret 单独注入
  # 一次性 Job：backoffLimit；失败后保留时间（便于 kubectl logs 排查，默认 24h）
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  # 可选：make trigger-ingest 时注入时间戳，使 Job 名带后缀从而每次创建新 Job 再跑一次采集
  triggerRunAt: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"

# 建表（Schema Init）：L1/L2 表由 Chart 内 Job 执行，连接信息与 ingest 同源（集群内 DSN + sslmode=disable）
schemaInit:
  enabled: true
  image: timescale/timescaledb-ha:pg14.6-ts2.9.1-p1
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400

storage:
  dataPath: /mnt/titan-data/postgres
  
  timescaledb:
    enabled: true
    pv:
      name: timescaledb-data-pv
      capacity: 50Gi
      subPath: timescaledb
      reclaimPolicy: Retain
    pvc:
      name: data-timescaledb-postgresql-0
      namespace: default
      accessMode: ReadWriteOnce
      storageRequest: 50Gi
  
  postgresL2:
    enabled: true
    pv:
      name: postgresql-l2-data-pv
      capacity: 20Gi
      subPath: postgresql-l2
      reclaimPolicy: Retain
    pvc:
      name: data-postgresql-l2-0
      namespace: default
      accessMode: ReadWriteOnce
      storageRequest: 20Gi

# 语义分类器-A（Module A）：连接 L1/L2 由 Secret 注入，与 ingest 同源；部署资源名 diting-semantic-classifier-a
# 使用生产数据（非 Mock）必须：(1) timescaleHost/postgresL2Host 指向含生产数据的库（集群外库请在 config 覆盖）；(2) chart config/diting_symbols.txt 中已有标的列表（与 diting-core 一致时可执行 make sync-semantic-classifier-a-symbols 同步）
module_a:
  enabled: false
  image:
    repository: diting-module-a
    tag: test
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  timescaleHost: "timescaledb-postgresql.default.svc.cluster.local"
  timescalePort: "5432"
  postgresL2Host: "postgresql-l2.default.svc.cluster.local"
  postgresL2Port: "5432"
  timescaleUser: "postgres"
  timescalePassword: "postgres"
  timescaleDatabase: "postgres"
  postgresL2User: "postgres"
  postgresL2Password: "postgres"
  postgresL2Database: "diting_l2"
  # 长期运行：RUN_LOOP=1 时每 24h 执行一次全量分类
  runLoop: false
  runLoopIntervalSec: 86400
  # 指定标的：由 ConfigMap 挂载 chart config/diting_symbols.txt，Pod 读 DITING_SYMBOLS=/config/diting_symbols.txt；该文件已有标的数据时直接 deploy 即可，需与 diting-core 一致时可执行 make sync-semantic-classifier-a-symbols
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "500m"
