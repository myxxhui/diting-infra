{{- if .Values.schemaInit.enabled }}
# 建表 Job 用连接串（与 ingest 同源；集群内连接加 sslmode=disable）
apiVersion: v1
kind: Secret
metadata:
  name: diting-db-connection
  namespace: default
  labels:
    app: diting
    component: schema-init
type: Opaque
stringData:
  TIMESCALE_DSN: "postgresql://{{ .Values.ingest.timescaleUser }}:{{ .Values.ingest.timescalePassword }}@{{ .Values.ingest.timescaleHost }}:{{ .Values.ingest.timescalePort }}/{{ .Values.ingest.timescaleDatabase }}?sslmode=disable"
  PG_L2_DSN: "postgresql://{{ .Values.ingest.postgresL2User }}:{{ .Values.ingest.postgresL2Password }}@{{ .Values.ingest.postgresL2Host }}:{{ .Values.ingest.postgresL2Port }}/{{ .Values.ingest.postgresL2Database }}?sslmode=disable"
{{- end }}
