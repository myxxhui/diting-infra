{{- if .Values.ingest.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: diting-ingest-conn
  namespace: default
  labels:
    app: diting
    component: ingest
type: Opaque
stringData:
  TIMESCALE_DSN: "postgresql://{{ .Values.ingest.timescaleUser }}:{{ .Values.ingest.timescalePassword }}@{{ .Values.ingest.timescaleHost }}:{{ .Values.ingest.timescalePort }}/{{ .Values.ingest.timescaleDatabase }}"
  PG_L2_DSN: "postgresql://{{ .Values.ingest.postgresL2User }}:{{ .Values.ingest.postgresL2Password }}@{{ .Values.ingest.postgresL2Host }}:{{ .Values.ingest.postgresL2Port }}/{{ .Values.ingest.postgresL2Database }}"
  REDIS_URL: "redis://{{ .Values.ingest.redisHost }}:{{ .Values.ingest.redisPort }}/0"
{{- end }}
