{{- if .Values.ingest.enabled }}
# 不作为 Hook，避免 Job 失败（如 BackoffLimitExceeded）导致整次 helm upgrade 失败；每次升级用新 revision 创建新 Job 便于排查
apiVersion: batch/v1
kind: Job
metadata:
  name: diting-ingest-{{ .Release.Revision }}
  namespace: default
  labels:
    app: diting
    component: ingest
  annotations:
    # 非 Hook：Helm 不等待 Job 完成，部署可成功；Job 失败时用 kubectl logs job/diting-ingest-<revision> -n default 排查
    "helm.sh/resource-policy": keep
spec:
  ttlSecondsAfterFinished: {{ .Values.ingest.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.ingest.backoffLimit }}
  template:
    metadata:
      labels:
        app: diting
        component: ingest
    spec:
      {{- with .Values.ingest.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
      - name: {{ if kindIs "string" . }}{{ . | quote }}{{ else }}{{ .name | default "" | quote }}{{ end }}
      {{- end }}
      {{- end }}
      restartPolicy: OnFailure
      # 云原生：init 容器在 DB/Redis 就绪前阻塞，Job 可与 stack 同次部署，无需两阶段
      initContainers:
      - name: wait-for-deps
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "等待 TimescaleDB..."
          until nc -z {{ .Values.ingest.timescaleHost }} {{ .Values.ingest.timescalePort }}; do sleep 2; done
          echo "等待 PostgreSQL L2..."
          until nc -z {{ .Values.ingest.postgresL2Host }} {{ .Values.ingest.postgresL2Port }}; do sleep 2; done
          echo "等待 Redis..."
          until nc -z {{ .Values.ingest.redisHost }} {{ .Values.ingest.redisPort }}; do sleep 2; done
          echo "依赖就绪，启动采集"
      containers:
      - name: ingest
        image: "{{ .Values.ingest.image.repository }}:{{ .Values.ingest.image.tag }}"
        imagePullPolicy: {{ .Values.ingest.image.pullPolicy }}
        # 每次部署：检查 L1 是否为空/过期，自动全量或增量（见 diting-core scripts/run_ingest_deploy.py）
        command: ["make", "ingest-deploy"]
        envFrom:
        - secretRef:
            name: diting-ingest-conn
        env:
        - name: INGEST_DEPLOY_FULL_DAYS_THRESHOLD
          value: {{ .Values.ingest.fullDaysThreshold | quote }}
        - name: INGEST_PRODUCTION_UNIVERSE
          value: {{ .Values.ingest.productionUniverse | default true | quote }}
        - name: INGEST_PRODUCTION_OHLCV
          value: {{ .Values.ingest.productionOhlcv | default true | quote }}
        - name: INGEST_PRODUCTION_INDUSTRY_REVENUE
          value: {{ .Values.ingest.productionIndustryRevenue | default true | quote }}
        - name: INGEST_PRODUCTION_NEWS
          value: {{ .Values.ingest.productionNews | default true | quote }}
        {{- if .Values.ingest.ingestSource }}
        - name: INGEST_SOURCE
          value: {{ .Values.ingest.ingestSource | quote }}
        {{- end }}
        {{- if .Values.ingest.jqdataDateStart }}
        - name: INGEST_JQDATA_DATE_START
          value: {{ .Values.ingest.jqdataDateStart | quote }}
        {{- end }}
        {{- if .Values.ingest.jqdataDateEnd }}
        - name: INGEST_JQDATA_DATE_END
          value: {{ .Values.ingest.jqdataDateEnd | quote }}
        {{- end }}
        {{- with .Values.ingest.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.ingest.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
