{{- if .Values.schemaInit.enabled }}
# 建表 Job：每次 upgrade 创建新 Job（diting-schema-init-<revision>），不阻塞部署；Pod 内脚本会等待 DB 就绪再执行 SQL
apiVersion: batch/v1
kind: Job
metadata:
  name: diting-schema-init-{{ .Release.Revision }}
  namespace: default
  labels:
    app: diting
    component: schema-init
  annotations:
    "helm.sh/resource-policy": keep
spec:
  ttlSecondsAfterFinished: {{ .Values.schemaInit.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.schemaInit.backoffLimit }}
  template:
    metadata:
      labels:
        app: diting
        component: schema-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-init
          image: {{ .Values.schemaInit.image }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/sql/run-schema-init.sh"]
          env:
            - name: TIMESCALE_DSN
              valueFrom:
                secretKeyRef:
                  name: diting-db-connection
                  key: TIMESCALE_DSN
            - name: PG_L2_DSN
              valueFrom:
                secretKeyRef:
                  name: diting-db-connection
                  key: PG_L2_DSN
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      volumes:
        - name: sql
          configMap:
            name: diting-schema-init-sql
{{- end }}
