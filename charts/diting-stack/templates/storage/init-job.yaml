apiVersion: batch/v1
kind: Job
metadata:
  name: diting-storage-init
  namespace: {{ .Values.storage.timescaledb.pvc.namespace }}
  labels:
    app: diting
    component: storage-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: diting
        component: storage-init
    spec:
      restartPolicy: OnFailure
      hostNetwork: true
      hostPID: true
      containers:
      - name: init-permissions
        image: busybox:1.36.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "初始化存储目录权限..."
          {{- if .Values.storage.timescaledb.enabled }}
          mkdir -p {{ .Values.storage.dataPath }}/{{ .Values.storage.timescaledb.pv.subPath }}
          chmod 777 {{ .Values.storage.dataPath }}/{{ .Values.storage.timescaledb.pv.subPath }}
          echo "✓ TimescaleDB 存储目录已初始化"
          {{- end }}
          {{- if .Values.storage.postgresL2.enabled }}
          mkdir -p {{ .Values.storage.dataPath }}/{{ .Values.storage.postgresL2.pv.subPath }}
          chmod 777 {{ .Values.storage.dataPath }}/{{ .Values.storage.postgresL2.pv.subPath }}
          echo "✓ PostgreSQL L2 存储目录已初始化"
          {{- end }}
          echo "✓ 所有存储目录初始化完成"
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
