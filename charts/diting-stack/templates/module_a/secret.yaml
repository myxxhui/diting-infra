{{- if .Values.module_a.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: diting-semantic-classifier-a-conn
  namespace: default
  labels:
    app: diting
    component: semantic-classifier-a
type: Opaque
stringData:
  TIMESCALE_DSN: "postgresql://{{ .Values.module_a.timescaleUser }}:{{ .Values.module_a.timescalePassword }}@{{ .Values.module_a.timescaleHost }}:{{ .Values.module_a.timescalePort }}/{{ .Values.module_a.timescaleDatabase }}"
  PG_L2_DSN: "postgresql://{{ .Values.module_a.postgresL2User }}:{{ .Values.module_a.postgresL2Password }}@{{ .Values.module_a.postgresL2Host }}:{{ .Values.module_a.postgresL2Port }}/{{ .Values.module_a.postgresL2Database }}"
{{- end }}
