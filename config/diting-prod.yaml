# ==============================================================================
# 生产环境（diting prod）部署配置
# ==============================================================================
# make deploy diting prod / make down diting prod 由此文件驱动。
# diting-stack：仅创建静态 PV/PVC（数据继承）；数据库使用官方 Bitnami Chart 部署。
# ==============================================================================

global:
  project_name: "diting"
  k3s:
    apiServer:
      domain: "k3s-diting-prod.example.com"

# deploy-engine 用：不在此处部署数据库，由 deploy-stack.sh 用官方 Chart 部署
deploy_control:
  enable_timescaledb: false
  enable_postgres_l2: false
  enable_redis: false
  k3s_storage_plugin: "local-path"

# Diting Stack：1) 静态存储 Chart  2) 数据库由脚本用官方 Chart 部署
stack:
  enabled: true
  chart_path: "charts/diting-stack"
  release_name: "diting-stack"
  namespace: "default"

  # 仅静态 PV/PVC + 初始化 Job（与 diting-stack Chart values 同构）
  storage:
    dataPath: /mnt/titan-data/postgres
    timescaledb:
      enabled: true
      pv:
        name: timescaledb-data-pv
        capacity: 50Gi
        subPath: timescaledb
        reclaimPolicy: Retain
      pvc:
        name: data-timescaledb-postgresql-0
        namespace: default
        accessMode: ReadWriteOnce
        storageRequest: 50Gi
    postgresL2:
      enabled: true
      pv:
        name: postgresql-l2-data-pv
        capacity: 20Gi
        subPath: postgresql-l2
        reclaimPolicy: Retain
      pvc:
        name: data-postgresql-l2-0
        namespace: default
        accessMode: ReadWriteOnce
        storageRequest: 20Gi

  # 采集 Job（云原生）：集群内跑 diting-ingest 镜像，启用后不再依赖 REPO_I_ROOT
  # 详见 docs/ingest-cloud-native.md；镜像来自项目 ACR，本地构建后 make push-images 推送，Chart 使用最新 tag
  # 后半部分实践：enabled=true 时部署/升级会创建 Job 执行 make ingest-deploy（检查后全量/增量）
  ingest:
    enabled: true
    image:
      repository: crpi-7vifw4ok9jkcxr60.cn-hongkong.personal.cr.aliyuncs.com/titan-core/diting-ingest
      tag: latest
      pullPolicy: Always
    # 私有 ACR 拉取凭证：部署前执行 kubectl apply -f charts/diting-stack/manifests/acr-pull-secret.yaml 或 make apply-acr-pull-secret
    imagePullSecrets: ["acr-titan"]
    # 密码与下面 databases 一致，或改为从 Secret 引用
    timescaleUser: "postgres"
    timescalePassword: "postgres"
    postgresL2User: "postgres"
    postgresL2Password: "postgres"

  # 数据库部署参数（供脚本调用 bitnami/postgresql、bitnami/redis 使用）
  databases:
    timescaledb:
      enabled: true
      auth:
        username: postgres
        password: postgres
        database: postgres
      persistence:
        existing_claim: "data-timescaledb-postgresql-0"
    postgres_l2:
      enabled: true
      auth:
        username: postgres
        password: postgres
        database: diting_l2
      persistence:
        existing_claim: "data-postgresql-l2-0"
    redis:
      enabled: true
      auth_enabled: false
      persistence:
        size: "10Gi"
        storage_class: "local-path"

# 后半部分：Up 后是否执行数据采集
data_ingestion:
  enabled: true
  target: "ingest-test"
  core_repo_path: ""
