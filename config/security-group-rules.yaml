# ==============================================================================
# 安全组入站规则配置（prod 环境部署后由脚本或控制台放通）
# ==============================================================================
# 每次部署前/后按此配置放通端口；需新增端口时在此添加后执行 make apply-security-group-rules 或
# scripts/apply-security-group-rules.sh。deploy-engine Terraform 已放通：22(SSH)、6443(K8s API)、
# VPC 内网、出站全部；本配置补充本机/CI 访问 NodePort 所需端口。
# 详见 docs/安全组规则说明.md
# ==============================================================================

# 地域（与 Terraform tfvars 中 region 一致，供脚本调用 aliyun CLI）
region: "cn-hongkong"

# 允许的入站规则：端口、协议、源 CIDR、说明
inbound_rules:
  # L1 TimescaleDB（与 prod-write-conn 中 NODEPORT_L1 一致时使用 30001；Bitnami 若固定 30432 则保留两条）
  - port: 30001
    protocol: tcp
    cidr: "0.0.0.0/0"
    description: "TimescaleDB L1 NodePort (prod.conn)"
  - port: 30432
    protocol: tcp
    cidr: "0.0.0.0/0"
    description: "TimescaleDB L1 NodePort (Bitnami 固定)"
  # L2 PostgreSQL
  - port: 30002
    protocol: tcp
    cidr: "0.0.0.0/0"
    description: "PostgreSQL L2 NodePort (prod.conn)"
  - port: 30433
    protocol: tcp
    cidr: "0.0.0.0/0"
    description: "PostgreSQL L2 NodePort (Bitnami 固定)"
  # Redis
  - port: 30379
    protocol: tcp
    cidr: "0.0.0.0/0"
    description: "Redis NodePort"
